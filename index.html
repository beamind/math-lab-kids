<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Math Lab Kids</title>
    <link rel="stylesheet" href="assets/styles/base.css">
  </head>
  <body>
    <main class="shell">
      <section class="intro">
        <p class="eyebrow">家庭数学实验室</p>
        <h1>看得见、摸得着、讲得出的数学</h1>
        <p class="intro-text">
          每个专题都是一个浏览器里的小实验。先让孩子操作和观察，再用少量挑战题检查是否真的理解。
        </p>
      </section>

      <section class="topic-grid" aria-label="专题列表">
        <a class="topic-card is-ready" href="topics/01_algebra-substitution/">
          <h2>整体代换积木机</h2>
          <p>把代数式看成可拼装的积木，理解为什么不必分别求出每个字母。</p>
        </a>

        <a class="topic-card is-ready" href="topics/02_find-defective/">
          <h2>找次品天平台</h2>
          <p>先用反证法想清楚“为什么 2 次不够”，再用一棵决策树给出 3 次就能照做的称法。</p>
        </a>

        <a class="topic-card is-ready" href="topics/03_one-stroke/">
          <h2>一笔画擂台</h2>
          <p>用半个篮球场的图，数“奇点”判断要几笔，再用不同颜色把每一笔画出来，最后给出一般规律。</p>
        </a>
      </section>
    </main>
  </body>
</html>
