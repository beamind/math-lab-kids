<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Math Lab Kids</title>
    <link rel="stylesheet" href="assets/styles/base.css">
  </head>
  <body>
    <main class="shell">
      <section class="intro">
        <p class="eyebrow">家庭数学实验室</p>
        <h1>看得见、摸得着、讲得出的数学</h1>
        <p class="intro-text">
          每个专题都是一个浏览器里的小实验。先让孩子操作和观察，再用少量挑战题检查是否真的理解。
        </p>
      </section>

      <section class="topic-grid" aria-label="专题列表">
        <a class="topic-card is-ready" href="topics/01_algebra-substitution/">
          <span class="topic-status">可使用</span>
          <h2>整体代换积木机</h2>
          <p>把代数式看成可拼装的积木，理解为什么不必分别求出每个字母。</p>
        </a>

        <article class="topic-card">
          <span class="topic-status">计划中</span>
          <h2>数量关系图</h2>
          <p>把应用题里的总量、每份、份数、差量变成可拖拽的结构。</p>
        </article>

        <article class="topic-card">
          <span class="topic-status">计划中</span>
          <h2>几何可视化</h2>
          <p>用方格、切分、旋转和拼接理解面积、周长、角度与对称。</p>
        </article>
      </section>
    </main>
  </body>
</html>
